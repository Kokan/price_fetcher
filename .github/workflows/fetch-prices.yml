name: Fetch Daily Prices

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch and store prices
        run: uv run python store_prices.py

      - name: Validate generated Beancount files
        run: uv run python validate_prices.py

      - name: Commit price updates
        run: |
          shopt -s nullglob
          price_files=(prices/[0-9][0-9][0-9][0-9]/*.beancount)
          if [ ${#price_files[@]} -eq 0 ]; then
            echo "No price files were generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -- "${price_files[@]}"
          if git diff --cached --quiet; then
            echo "No price updates to commit."
          else
            git commit -m "Update daily prices"
            git push
          fi
